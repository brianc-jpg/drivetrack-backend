<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DriveTrack CRM</title><style>*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{background:#f5f5f3;color:#1a1a18;min-height:100vh;overflow:hidden}.shell{display:flex;height:100vh}.sidebar{width:210px;background:#fff;border-right:1px solid #e8e7e2;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}.logo{padding:16px 18px;font-size:15px;font-weight:700;border-bottom:1px solid #e8e7e2;letter-spacing:-.02em}.logo em{font-style:normal;color:#888;font-weight:400}.nav-section{padding:8px 10px 2px;font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-top:6px}.ni{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:#555;margin:1px 4px}.ni:hover{background:#f5f5f3;color:#1a1a18}.ni.on{background:#f0efeb;color:#1a1a18;font-weight:500}.ni-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}.status-bar{padding:12px 14px;border-top:1px solid #e8e7e2;font-size:11px;color:#999;margin-top:auto}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ccc;margin-right:5px;vertical-align:middle}.dot.green{background:#1D9E75}.dot.red{background:#E24B4A}.dot.yellow{background:#EF9F27}.main{flex:1;display:flex;flex-direction:column;min-width:0}.topbar{padding:13px 20px;background:#fff;border-bottom:1px solid #e8e7e2;display:flex;align-items:center;gap:10px;flex-shrink:0}.topbar h1{font-size:15px;font-weight:600;flex:1}.btn{font-size:12px;padding:6px 12px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#333;cursor:pointer;font-weight:500;white-space:nowrap}.btn:hover{background:#f5f5f3}.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18}.btn-primary:hover{background:#333}.btn-danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}.content{flex:1;overflow-y:auto;padding:20px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}.stat{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e8e7e2}.stat-label{font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}.stat-val{font-size:24px;font-weight:600}.card{background:#fff;border-radius:10px;border:1px solid #e8e7e2;overflow:hidden;margin-bottom:16px}.card-header{padding:12px 16px;border-bottom:1px solid #e8e7e2;display:flex;align-items:center;gap:10px;background:#fafaf8}.card-title{font-size:13px;font-weight:600;flex:1}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#fafaf8;padding:9px 14px;text-align:left;font-weight:500;font-size:11px;color:#888;border-bottom:1px solid #e8e7e2;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}td{padding:9px 14px;border-bottom:1px solid #f0efe9;vertical-align:middle;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}tr:last-child td{border-bottom:none}tr.row{cursor:pointer}tr.row:hover td{background:#fafaf8}.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}.p-intake{background:#dbeafe;color:#1e40af}.p-insurance_verify{background:#fce7f3;color:#9d174d}.p-approved{background:#d1fae5;color:#065f46}.p-active{background:#dcfce7;color:#166534}.p-billing{background:#fef3c7;color:#92400e}.p-billing_issue{background:#fee2e2;color:#991b1b}.p-closed,.p-default{background:#f3f4f6;color:#4b5563}.p-available{background:#dcfce7;color:#166534}.p-rented{background:#dbeafe;color:#1e40af}.p-maintenance{background:#fef3c7;color:#92400e}.p-out_of_service{background:#fee2e2;color:#991b1b}.empty{padding:50px 24px;text-align:center;color:#aaa;font-size:13px;line-height:2}.lmsg{padding:50px 24px;text-align:center;color:#888;font-size:14px}.err{margin-bottom:14px;padding:12px 16px;background:#fee2e2;border-radius:8px;color:#991b1b;font-size:13px}.back{font-size:13px;color:#666;cursor:pointer;background:none;border:none;padding:0;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px;font-weight:500}.back:hover{color:#1a1a18}.av{width:44px;height:44px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#1e40af;flex-shrink:0}.dh{display:flex;align-items:center;gap:14px;margin-bottom:16px}.dn{font-size:17px;font-weight:600}.ds{font-size:13px;color:#666;margin-top:2px}.stitle{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;margin-top:16px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}.f{background:#fafaf8;border-radius:8px;padding:9px 12px;border:1px solid #e8e7e2;min-width:0}.fl{font-size:10px;color:#aaa;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}.fv{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tli{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0efe9}.tli:last-child{border:none}.tld{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;margin-top:5px}.tlt{font-size:12px}.tldate{font-size:10px;color:#aaa;margin-top:2px}.taski{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0efe9}.taski:last-child{border:none}.cb{width:16px;height:16px;border:1.5px solid #ccc;border-radius:4px;flex-shrink:0;cursor:pointer;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;color:#1D9E75}.cb.done{background:#dcfce7;border-color:#1D9E75}.ttxt{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ttxt.done{text-decoration:line-through;color:#aaa}.pri-urgent{font-size:10px;color:#dc2626;font-weight:600}.pri-high{font-size:10px;color:#d97706;font-weight:600}.pri-normal{font-size:10px;color:#aaa}.fbadge{font-size:11px;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}.fdone{background:#dcfce7;color:#166534}.fpend{background:#f3f4f6;color:#6b7280}.dc{background:#fff;border-radius:10px;border:1px solid #e8e7e2;padding:18px}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}.modal{background:#fff;border-radius:12px;padding:24px;width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}.form-row{display:flex;gap:10px;margin-bottom:12px}.form-group{display:flex;flex-direction:column;gap:4px;flex:1}.form-group label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em}.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;width:100%}.form-group input:focus,.form-group select:focus{outline:none;border-color:#888}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid #e8e7e2}.stage-select{font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer}.pipeline{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.pipeline-col{background:#fff;border-radius:10px;border:1px solid #e8e7e2;overflow:hidden}.pipeline-header{padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e8e7e2}.pipeline-card{padding:10px 12px;border-bottom:1px solid #f0efe9;cursor:pointer;font-size:12px}.pipeline-card:last-child{border:none}.pipeline-card:hover{background:#fafaf8}.pipeline-name{font-weight:600;margin-bottom:2px}.pipeline-sub{color:#888;font-size:11px}</style></head><body><div class="shell"><div class="sidebar"><div class="logo">Drive<em>Track</em></div><div class="nav-section">Operation</div><div class="ni on" id="n-dashboard" data-view="dashboard"><span class="ni-icon">&#9638;</span> Dashboard</div><div class="ni" id="n-intake" data-view="intake"><span class="ni-icon">&#8677;</span> Intake Queue</div><div class="ni" id="n-shops" data-view="shops"><span class="ni-icon">&#9961;</span> Body Shops</div><div class="ni" id="n-fleet" data-view="fleet"><span class="ni-icon">&#9656;</span> Fleet</div><div class="ni" id="n-renters" data-view="renters"><span class="ni-icon">&#9737;</span> Renters</div><div class="nav-section">Billing</div><div class="ni" id="n-pipeline" data-view="pipeline"><span class="ni-icon">&#8644;</span> Pipeline</div><div class="ni" id="n-issues" data-view="issues"><span class="ni-icon">&#9888;</span> Billing Issues</div><div class="nav-section">Team</div><div class="ni" id="n-tasks" data-view="tasks"><span class="ni-icon">&#10003;</span> Tasks</div><div class="ni" id="n-employees" data-view="employees"><span class="ni-icon">&#128100;</span> Employees</div><div class="status-bar"><span class="dot yellow" id="sdot"></span><span id="stxt">Connecting...</span></div></div><div class="main"><div class="topbar"><h1 id="ptitle">Dashboard</h1><button class="btn" id="refreshBtn">&#8635; Refresh</button><button class="btn btn-primary" id="addBtn" style="display:none">+ Add</button></div><div class="content" id="content"><div class="lmsg">Loading...</div></div></div></div><div class="modal-bg" id="modalBg" style="display:none"><div class="modal" id="modal"></div></div><script>const BASE='';
let S={view:'dashboard',renters:[],tasks:[],shops:[],fleet:[],employees:[],sel:null,loading:true,err:null};
function ss(c,t){document.getElementById('sdot').className='dot '+c;document.getElementById('stxt').textContent=t;}
async function load(){S.loading=true;S.err=null;ss('yellow','Loading...');render();try{const[rv,tv,sv,fv,ev]=await Promise.all([fetch(BASE+'/api/renters').then(r=>r.json()),fetch(BASE+'/api/tasks').then(r=>r.json()),fetch(BASE+'/api/shops').then(r=>r.json()),fetch(BASE+'/api/fleet').then(r=>r.json()),fetch(BASE+'/api/employees').then(r=>r.json())]);S.renters=Array.isArray(rv)?rv:[];S.tasks=Array.isArray(tv)?tv:[];S.shops=Array.isArray(sv)?sv:[];S.fleet=Array.isArray(fv)?fv:[];S.employees=Array.isArray(ev)?ev:[];S.loading=false;ss('green','Online - '+S.renters.length+' renters');render();}catch(e){S.loading=false;S.err=e.message;ss('red','Error');render();}}
function setView(v){S.view=v;S.sel=null;document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('on',el.dataset.view===v));const titles={dashboard:'Dashboard',intake:'Intake Queue',shops:'Body Shops',fleet:'Fleet',renters:'Renters',pipeline:'Billing Pipeline',issues:'Billing Issues',tasks:'Tasks',employees:'Employees'};document.getElementById('ptitle').textContent=titles[v]||v;const addViews=['shops','fleet','employees','tasks'];document.getElementById('addBtn').style.display=addViews.includes(v)?'':'none';render();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function ini(r){return((r.first_name||'?')[0]+(r.last_name||'?')[0]).toUpperCase();}
function pill(s){const L={intake:'Intake',insurance_verify:'Ins. verify',approved:'Approved',active:'Active',billing:'Billing',billing_issue:'Billing issue',collected_ins:'Collected',collected_cc:'Coll. CC',closed:'Closed',available:'Available',rented:'Rented',maintenance:'Maintenance',out_of_service:'Out of service'};const cls=(s||'default').replace(/[^a-z_]/g,'');return '<span class="pill p-'+cls+'">'+(L[s]||s||'--')+'</span>';}
function render(){const el=document.getElementById('content');if(S.loading){el.innerHTML='<div class="lmsg">Loading...</div>';return;}let h=S.err?'<div class="err">Error: '+esc(S.err)+'</div>':'';if(S.view==='dashboard')h+=vDash();else if(S.view==='intake')h+=vIntake();else if(S.view==='shops')h+=vShops();else if(S.view==='fleet')h+=vFleet();else if(S.view==='renters')h+=S.sel?vDetail():vRenters();else if(S.view==='pipeline')h+=vPipeline();else if(S.view==='issues')h+=vIssues();else if(S.view==='tasks')h+=vTasks();else if(S.view==='employees')h+=vEmployees();el.innerHTML=h;}
function vDash(){const r=S.renters,t=S.tasks,intake=r.filter(x=>x.stage==='intake').length,active=r.filter(x=>x.stage==='active').length,billing=r.filter(x=>x.stage==='billing').length,issues=r.filter(x=>x.stage==='billing_issue').length,open=t.filter(x=>!x.done).length,avail=S.fleet.filter(x=>x.status==='available').length;let h='<div class="stats"><div class="stat"><div class="stat-label">In intake</div><div class="stat-val">'+intake+'</div></div><div class="stat"><div class="stat-label">Active rentals</div><div class="stat-val" style="color:#166534">'+active+'</div></div><div class="stat"><div class="stat-label">In billing</div><div class="stat-val" style="color:#92400e">'+billing+'</div></div><div class="stat"><div class="stat-label">Billing issues</div><div class="stat-val" style="color:#991b1b">'+issues+'</div></div><div class="stat"><div class="stat-label">Open tasks</div><div class="stat-val" style="color:#dc2626">'+open+'</div></div><div class="stat"><div class="stat-label">Fleet available</div><div class="stat-val" style="color:#1D9E75">'+avail+'</div></div></div>';h+='<div class="card"><div class="card-header"><span class="card-title">Recent Renters</span></div>';if(!r.length)h+='<div class="empty">No renters yet. Submit a form at autoinjuryrentals.com/rental-agreement</div>';else{h+='<table><thead><tr><th>Name</th><th>Insurance</th><th>Shop</th><th>Stage</th></tr></thead><tbody>';r.slice(0,8).forEach(x=>{h+='<tr class="row" data-rid="'+esc(x.id)+'"><td style="font-weight:600">'+esc(x.first_name)+' '+esc(x.last_name)+'</td><td>'+esc(x.insurance_company||'--')+'</td><td>'+esc(x.shop_name||'--')+'</td><td>'+pill(x.stage)+'</td></tr>';});h+='</tbody></table>';}h+='</div>';const urg=t.filter(x=>!x.done&&x.priority==='urgent').slice(0,5);if(urg.length){h+='<div class="card"><div class="card-header"><span class="card-title">Urgent Tasks</span></div><table><thead><tr><th></th><th>Task</th><th>Renter</th></tr></thead><tbody>';urg.forEach(t=>{h+='<tr><td style="width:32px"><div class="cb" data-tid="'+esc(t.id)+'" data-was="0"></div></td><td>'+esc(t.title)+'</td><td>'+esc(t.renter_name||'--')+'</td></tr>';});h+='</tbody></table></div>';}return h;}
function vIntake(){const q=S.renters.filter(x=>x.stage==='intake'||x.stage==='insurance_verify'||x.stage==='approved');if(!q.length)return'<div class="card"><div class="empty">No renters in intake queue.<br>New form submissions appear here.</div></div>';let h='<div class="card"><table><thead><tr><th>Name</th><th>Phone</th><th>Insurance</th><th>Claim #</th><th>Shop</th><th>Stage</th><th>Move to</th></tr></thead><tbody>';q.forEach(x=>{h+='<tr class="row" data-rid="'+esc(x.id)+'"><td style="font-weight:600">'+esc(x.first_name)+' '+esc(x.last_name)+'</td><td>'+esc(x.cell_phone||'--')+'</td><td>'+esc(x.insurance_company||'--')+'</td><td>'+esc(x.claim_number||'--')+'</td><td>'+esc(x.shop_name||'--')+'</td><td>'+pill(x.stage)+'</td><td onclick="event.stopPropagation()"><select class="stage-select" data-stageid="'+esc(x.id)+'">'+ ['intake','insurance_verify','approved','active','billing','closed'].map(s=>'<option value="'+s+'"'+(s===x.stage?' selected':'')+'>'+s+'</option>').join('')+'</select></td></tr>';});return h+'</tbody></table></div>';}
function vShops(){if(!S.shops.length)return'<div class="card"><div class="empty">No body shops added yet.<br>Click "+ Add" to add partner shops.</div></div>';let h='<div class="card"><table><thead><tr><th>Shop Name</th><th>Contact</th><th>Phone</th><th>City</th><th>Active Rentals</th><th></th></tr></thead><tbody>';S.shops.forEach(s=>{const a=S.renters.filter(r=>r.shop_name===s.name&&r.stage==='active').length;h+='<tr><td style="font-weight:600">'+esc(s.name)+'</td><td>'+esc(s.contact_name||'--')+'</td><td>'+esc(s.phone||'--')+'</td><td>'+esc(s.city||'--')+'</td><td><span style="font-weight:600;color:'+(a?'#166534':'#888')+'">'+a+'</span></td><td><button class="btn btn-danger" style="padding:3px 8px;font-size:11px" data-delshop="'+esc(s.id)+'">Remove</button></td></tr>';});return h+'</tbody></table></div>';}
function vFleet(){if(!S.fleet.length)return'<div class="card"><div class="empty">No vehicles in fleet.<br>Click "+ Add" to add vehicles.</div></div>';let h='<div class="card"><table><thead><tr><th>Vehicle #</th><th>Year/Make/Model</th><th>Plate</th><th>Status</th><th>Current Renter</th><th>Fuel</th><th></th></tr></thead><tbody>';S.fleet.forEach(v=>{h+='<tr><td style="font-weight:600">'+esc(v.vehicle_number)+'</td><td>'+esc([v.year,v.make,v.model].filter(Boolean).join(' ')||'--')+'</td><td>'+esc(v.license_plate||'--')+'</td><td>'+pill(v.status)+'</td><td>'+esc(v.current_renter_name||'--')+'</td><td>'+esc(v.fuel_level||'--')+'</td><td><button class="btn btn-danger" style="padding:3px 8px;font-size:11px" data-delfleet="'+esc(v.id)+'">Remove</button></td></tr>';});return h+'</tbody></table></div>';}
function vRenters(){if(!S.renters.length)return'<div class="card"><div class="empty">No renters yet.</div></div>';let h='<div class="card"><table><thead><tr><th>Name</th><th>Phone</th><th>Insurance</th><th>Claim #</th><th>Shop</th><th>Vehicle #</th><th>Stage</th></tr></thead><tbody>';S.renters.forEach(x=>{h+='<tr class="row" data-rid="'+esc(x.id)+'"><td style="font-weight:600">'+esc(x.first_name)+' '+esc(x.last_name)+'</td><td>'+esc(x.cell_phone||'--')+'</td><td>'+esc(x.insurance_company||'--')+'</td><td>'+esc(x.claim_number||'--')+'</td><td>'+esc(x.shop_name||'--')+'</td><td>'+esc(x.rental_vehicle_number||'--')+'</td><td>'+pill(x.stage)+'</td></tr>';});return h+'</tbody></table></div>';}
function vDetail(){const x=S.sel;if(!x)return'';const tl=x.timeline||[],ts=x.tasks||[],fs=x.forms||[];let h='<button class="back" id="backBtn">&#8592; Back to Renters</button><div class="dc"><div class="dh"><div class="av">'+ini(x)+'</div><div><div class="dn">'+esc(x.first_name)+' '+esc(x.last_name)+'</div><div class="ds">'+esc(x.cell_phone||'')+(x.email?' - '+esc(x.email):'')+'</div><div style="margin-top:6px;display:flex;align-items:center;gap:8px">'+pill(x.stage)+'<select class="stage-select" data-stageid="'+esc(x.id)+'">'+ ['intake','insurance_verify','approved','active','billing','billing_issue','collected_ins','collected_cc','closed'].map(s=>'<option value="'+s+'"'+(s===x.stage?' selected':'')+'>Move: '+s+'</option>').join('')+'</select></div></div></div>';h+='<div class="stitle">Forms</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">';['rental_form','incoming_walkaround','outgoing_walkaround'].forEach(ft=>{const d=fs.find(f=>f.form_type===ft);h+='<span class="fbadge '+(d?'fdone':'fpend')+'">'+(d?'&#10003;':'&#9675;')+' '+ft.replace(/_/g,' ')+'</span>';});h+='</div>';h+='<div class="stitle">Insurance</div><div class="fg"><div class="f"><div class="fl">Company</div><div class="fv">'+esc(x.insurance_company||'--')+'</div></div><div class="f"><div class="fl">Claim #</div><div class="fv">'+esc(x.claim_number||'--')+'</div></div><div class="f"><div class="fl">Agent</div><div class="fv">'+esc(x.insurance_agent_name||'--')+'</div></div><div class="f"><div class="fl">Agent Phone</div><div class="fv">'+esc(x.insurance_agent_phone||'--')+'</div></div><div class="f"><div class="fl">3rd Party</div><div class="fv">'+esc(x.third_party_insurer||'--')+'</div></div><div class="f"><div class="fl">RCP Decision</div><div class="fv">'+esc(x.rcp_decision||'--')+'</div></div></div>';h+='<div class="stitle">Rental</div><div class="fg"><div class="f"><div class="fl">Shop</div><div class="fv">'+esc(x.shop_name||'--')+'</div></div><div class="f"><div class="fl">Vehicle #</div><div class="fv">'+esc(x.rental_vehicle_number||'--')+'</div></div><div class="f"><div class="fl">Pickup Date</div><div class="fv">'+esc(x.pickup_date||'--')+'</div></div><div class="f"><div class="fl">Return Date</div><div class="fv">'+esc(x.return_date||'--')+'</div></div><div class="f"><div class="fl">Pickup Fuel</div><div class="fv">'+esc(x.pickup_fuel||'--')+'</div></div><div class="f"><div class="fl">Return Fuel</div><div class="fv">'+esc(x.return_fuel||'--')+'</div></div><div class="f"><div class="fl">Pickup Odo</div><div class="fv">'+esc(x.pickup_odometer||'--')+'</div></div><div class="f"><div class="fl">Return Odo</div><div class="fv">'+esc(x.return_odometer||'--')+'</div></div></div>';if(ts.length){h+='<div class="stitle">Tasks</div>';ts.forEach(t=>{h+='<div class="taski"><div class="cb '+(t.done?'done':'')+' " data-tid="'+esc(t.id)+'" data-was="'+(t.done?1:0)+'">'+(t.done?'&#10003;':'')+'</div><span class="ttxt '+(t.done?'done':'')+'" >'+esc(t.title)+'</span><span class="pri-'+(t.priority||'normal')+' ">'+(t.priority||'')+'</span></div>';});}if(tl.length){h+='<div class="stitle">Timeline</div>';[...tl].reverse().forEach(ev=>{h+='<div class="tli"><div class="tld"></div><div><div class="tlt">'+esc(ev.text)+'</div><div class="tldate">'+esc(ev.date?ev.date.slice(0,16).replace('T',' '):'')+'</div></div></div>';});}return h+'</div>';}
function vPipeline(){const stages=['active','billing','billing_issue','collected_ins','collected_cc','closed'];const labels={active:'Active Rental',billing:'Billing',billing_issue:'Billing Issue',collected_ins:'Collected (Ins)',collected_cc:'Collected (CC)',closed:'Closed'};let h='<div class="pipeline">';stages.forEach(stage=>{const grp=S.renters.filter(x=>x.stage===stage);h+='<div class="pipeline-col"><div class="pipeline-header">'+labels[stage]+' <span style="color:#aaa;font-weight:400">('+grp.length+')</span></div>';if(!grp.length)h+='<div style="padding:12px 14px;font-size:12px;color:#bbb">None</div>';else grp.forEach(x=>{h+='<div class="pipeline-card row" data-rid="'+esc(x.id)+'"><div class="pipeline-name">'+esc(x.first_name)+' '+esc(x.last_name)+'</div><div class="pipeline-sub">'+esc(x.insurance_company||'No insurance')+'</div></div>';});h+='</div>';});return h+'</div>';}
function vIssues(){const issues=S.renters.filter(x=>x.stage==='billing_issue');if(!issues.length)return'<div class="card"><div class="empty">No billing issues. &#127881;</div></div>';let h='<div class="card"><table><thead><tr><th>Name</th><th>Phone</th><th>Insurance</th><th>Claim #</th><th>Shop</th><th>Move to</th></tr></thead><tbody>';issues.forEach(x=>{h+='<tr class="row" data-rid="'+esc(x.id)+'"><td style="font-weight:600">'+esc(x.first_name)+' '+esc(x.last_name)+'</td><td>'+esc(x.cell_phone||'--')+'</td><td>'+esc(x.insurance_company||'--')+'</td><td>'+esc(x.claim_number||'--')+'</td><td>'+esc(x.shop_name||'--')+'</td><td onclick="event.stopPropagation()"><select class="stage-select" data-stageid="'+esc(x.id)+'">'+ ['billing_issue','billing','collected_ins','collected_cc','closed'].map(s=>'<option value="'+s+'"'+(s===x.stage?' selected':'')+'>'+s+'</option>').join('')+'</select></td></tr>';});return h+'</tbody></table></div>';}
function vTasks(){const op=S.tasks.filter(t=>!t.done),dn=S.tasks.filter(t=>t.done);if(!S.tasks.length)return'<div class="card"><div class="empty">No tasks yet.</div></div>';let h='<div class="card"><div class="card-header"><span class="card-title">Open ('+op.length+')</span></div>';if(op.length){h+='<table><thead><tr><th></th><th>Task</th><th>Renter</th><th>Priority</th><th>Assignee</th></tr></thead><tbody>';op.forEach(t=>{h+='<tr><td style="width:32px"><div class="cb" data-tid="'+esc(t.id)+'" data-was="0"></div></td><td>'+esc(t.title)+'</td><td>'+esc(t.renter_name||'--')+'</td><td><span class="pri-'+(t.priority||'normal')+' ">'+(t.priority||'normal')+'</span></td><td>'+esc(t.assignee||'--')+'</td></tr>';});h+='</tbody></table>';}else h+='<div style="padding:14px;font-size:13px;color:#aaa">All tasks done!</div>';h+='</div>';if(dn.length){h+='<div class="card"><div class="card-header"><span class="card-title" style="color:#bbb">Done ('+dn.length+')</span></div><table><thead><tr><th></th><th>Task</th><th>Renter</th></tr></thead><tbody>';dn.forEach(t=>{h+='<tr><td style="color:#1D9E75">&#10003;</td><td style="text-decoration:line-through;color:#bbb">'+esc(t.title)+'</td><td style="color:#bbb">'+esc(t.renter_name||'--')+'</td></tr>';});h+='</tbody></table></div>';}return h;}
function vEmployees(){if(!S.employees.length)return'<div class="card"><div class="empty">No employees added yet.<br>Click "+ Add" to add team members.</div></div>';let h='<div class="card"><table><thead><tr><th>Name</th><th>Role</th><th>Phone</th><th>Email</th><th></th></tr></thead><tbody>';S.employees.forEach(e=>{h+='<tr><td style="font-weight:600">'+esc(e.first_name)+' '+esc(e.last_name)+'</td><td>'+esc(e.role||'--')+'</td><td>'+esc(e.phone||'--')+'</td><td>'+esc(e.email||'--')+'</td><td><button class="btn btn-danger" style="padding:3px 8px;font-size:11px" data-delemp="'+esc(e.id)+'">Remove</button></td></tr>';});return h+'</tbody></table></div>';}
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modalBg').style.display='flex';}
function hideModal(){document.getElementById('modalBg').style.display='none';}
function showAddShop(){showModal('<h2>Add Body Shop</h2><div class="form-row"><div class="form-group"><label>Shop Name *</label><input id="m-name" placeholder="ABC Auto Body"></div></div><div class="form-row"><div class="form-group"><label>Contact</label><input id="m-contact"></div><div class="form-group"><label>Phone</label><input id="m-phone"></div></div><div class="form-row"><div class="form-group"><label>Email</label><input id="m-email"></div></div><div class="form-row"><div class="form-group"><label>City</label><input id="m-city"></div><div class="form-group"><label>State</label><input id="m-state"></div></div><div class="modal-actions"><button class="btn" id="cancelModal">Cancel</button><button class="btn btn-primary" id="saveShop">Add Shop</button></div>');}
function showAddFleet(){showModal('<h2>Add Vehicle</h2><div class="form-row"><div class="form-group"><label>Vehicle # *</label><input id="m-vnum"></div><div class="form-group"><label>Status</label><select id="m-vstatus"><option value="available">Available</option><option value="rented">Rented</option><option value="maintenance">Maintenance</option></select></div></div><div class="form-row"><div class="form-group"><label>Year</label><input id="m-year"></div><div class="form-group"><label>Make</label><input id="m-make"></div><div class="form-group"><label>Model</label><input id="m-model"></div></div><div class="form-row"><div class="form-group"><label>Color</label><input id="m-color"></div><div class="form-group"><label>Plate</label><input id="m-plate"></div></div><div class="form-row"><div class="form-group"><label>VIN</label><input id="m-vin"></div></div><div class="form-row"><div class="form-group"><label>Mileage</label><input id="m-miles" type="number" placeholder="0"></div><div class="form-group"><label>Fuel</label><select id="m-fuel"><option>full</option><option>3/4</option><option>1/2</option><option>1/4</option><option>empty</option></select></div></div><div class="modal-actions"><button class="btn" id="cancelModal">Cancel</button><button class="btn btn-primary" id="saveFleet">Add Vehicle</button></div>');}
function showAddEmployee(){showModal('<h2>Add Employee</h2><div class="form-row"><div class="form-group"><label>First Name *</label><input id="m-fname"></div><div class="form-group"><label>Last Name *</label><input id="m-lname"></div></div><div class="form-row"><div class="form-group"><label>Role</label><input id="m-role" placeholder="Driver, Manager..."></div></div><div class="form-row"><div class="form-group"><label>Phone</label><input id="m-phone"></div><div class="form-group"><label>Email</label><input id="m-email"></div></div><div class="modal-actions"><button class="btn" id="cancelModal">Cancel</button><button class="btn btn-primary" id="saveEmployee">Add Employee</button></div>');}
function showAddTask(){const rl=S.renters.map(r=>'<option value="'+esc(r.first_name+' '+r.last_name)+'">').join('');const empOpts=S.employees.map(emp=>'<option value="'+esc(emp.first_name+' '+emp.last_name)+'">').join('');showModal('<h2>Add Task</h2><div class="form-row"><div class="form-group"><label>Task *</label><input id="m-title"></div></div><div class="form-row"><div class="form-group"><label>Renter</label><input id="m-renter" list="rl"><datalist id="rl">'+rl+'</datalist></div></div><div class="form-row"><div class="form-group"><label>Priority</label><select id="m-priority"><option value="normal">Normal</option><option value="high">High</option><option value="urgent">Urgent</option></select></div><div class="form-group"><label>Assignee</label><input id="m-assignee" list="el"><datalist id="el">'+el+'</datalist></div></div><div class="modal-actions"><button class="btn" id="cancelModal">Cancel</button><button class="btn btn-primary" id="saveTask">Add Task</button></div>');}
async function openRenter(id){S.view='renters';S.sel=null;document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('on',el.dataset.view==='renters'));document.getElementById('ptitle').textContent='Renters';document.getElementById('addBtn').style.display='none';render();try{const r=await fetch(BASE+'/api/renters/'+id).then(x=>x.json());S.sel=r;render();}catch(e){S.err=e.message;render();}}
async function patchTask(id,was){try{await fetch(BASE+'/api/tasks/'+id+'/done',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({done:(!was)})});if(S.sel){const r=await fetch(BASE+'/api/renters/'+S.sel.id).then(x=>x.json());S.sel=r;}load();}catch(e){}}
async function updateStage(id,stage){try{await fetch(BASE+'/api/renters/'+id+'/stage',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({stage:stage}));load();}catch(e){}}
document.addEventListener('click',async function(ev){const nv=ev.target.closest('.ni[data-view]');if(nv){setView(nv.dataset.view);return;}if(ev.target.closest('#refreshBtn')){S.sel=null;load();return;}if(ev.target.closest('#backBtn')){S.sel=null;render();return;}if(ev.target.closest('#addBtn')){if(S.view==='shops')showAddShop();else if(S.view==='fleet')showAddFleet();else if(S.view==='employees')showAddEmployee();else if(S.view==='tasks')showAddTask();return;}if(ev.target.closest('#cancelModal')){hideModal();return;}if(ev.target===document.getElementById('modalBg')){hideModal();return;}if(ev.target.closest('#saveShop')){const b={name:document.getElementById('m-name').value,contact_name:document.getElementById('m-contact').value,phone:document.getElementById('m-phone').value,email:document.getElementById('m-email').value,city:document.getElementById('m-city').value,state:document.getElementById('m-state').value};if(!b.name){alert('Shop name required');return;}await fetch(BASE+'/api/shops',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});hideModal();load();return;}if(ev.target.closest('#saveFleet')){const b={vehicle_number:document.getElementById('m-vnum').value,status:document.getElementById('m-vstatus').value,year:document.getElementById('m-year').value,make:document.getElementById('m-make').value,model:document.getElementById('m-model').value,color:document.getElementById('m-color').value,license_plate:document.getElementById('m-plate').value,vin:document.getElementById('m-vin').value,mileage:document.getElementById('m-miles').value||0,fuel_level:document.getElementById('m-fuel').value};if(!b.vehicle_number){alert('Vehicle number required');return;}await fetch(BASE+'/api/fleet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});hideModal();load();return;}if(ev.target.closest('#saveEmployee')){const b={first_name:document.getElementById('m-fname').value,last_name:document.getElementById('m-lname').value,role:document.getElementById('m-role').value,phone:document.getElementById('m-phone').value,email:document.getElementById('m-email').value};if(!b.first_name){alert('First name required');return;}await fetch(BASE+'/api/employees',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});hideModal();load();return;}if(ev.target.closest('#saveTask')){const b={title:document.getElementById('m-title').value,renter_name:document.getElementById('m-renter').value,priority:document.getElementById('m-priority').value,assignee:document.getElementById('m-assignee').value};if(!b.title){alert('Task title required');return;}await fetch(BASE+'/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});hideModal();load();return;}const ds=ev.target.closest('[data-delshop]');if(ds){if(confirm('Remove this shop?')){await fetch(BASE+'/api/shops/'+ds.dataset.delshop,{method:'DELETE'});load();}return;}const df=ev.target.closest('[data-delfleet]');if(df){if(confirm('Remove this vehicle?')){await fetch(BASE+'/api/fleet/'+df.dataset.delfleet,{method:'DELETE'});load();}return;}const de=ev.target.closest('[data-delemp]');if(de){if(confirm('Remove this employee?')){await fetch(BASE+'/api/employees/'+de.dataset.delemp,{method:'DELETE'});load();}return;}const cb=ev.target.closest('.cb[data-tid]');if(cb){patchTask(cb.dataset.tid,cb.dataset.was==='1');return;}const rw=ev.target.closest('tr.row[data-rid],.pipeline-card.row[data-rid]');if(rw){openRenter(rw.dataset.rid);return;}});
document.addEventListener('change',function(ev){const sel=ev.target.closest('[data-stageid]');if(sel)updateStage(sel.dataset.stageid,sel.value);});
load();</script></body></html>
